<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes📝</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="main">
      <header>
        <h1>Notes</h1>
      </header>
      <section id="notes-cont">
        <!-- NO NOTES SECTION -->
      </section>

      <!-- EDITOR VIEW -->
      <section class="editor-view hidden">
        <header class="editor-header">
          <button type="button" class="back-btn">←</button>

          <div class="editor-actions">
            <button type="button" class="menu-btn">⋮</button>
            <button type="submit" form="note-form" class="top-save-btn hidden">
              ✓
            </button>
          </div>
        </header>

        <form id="note-form" class="note-form">
          <input
            class="title-input"
            type="text"
            placeholder="Title"
            maxlength="20"
          />

          <textarea class="desc-input" placeholder="Description"></textarea>
        </form>
      </section>

      <!-- ADD NOTES -->
      <button class="add-note-btn">
        <img
          src="./images/add_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
          alt="add notes"
          class="add-btn-icon"
        />
      </button>
    </main>
    <script src="script.js"></script>
  </body>
</html>
